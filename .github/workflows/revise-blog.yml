name: Revise Blog Post

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug of the pending post to revise'
        required: true
      feedback:
        description: 'JSON array of {quote, comment} reviewer feedback items'
        required: true

permissions:
  contents: write

jobs:
  revise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run revision pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REVIEW_SIGNING_SECRET: ${{ secrets.REVIEW_SIGNING_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVISE_SLUG: ${{ inputs.slug }}
          REVISE_FEEDBACK: ${{ inputs.feedback }}
        run: python scripts/revise_blog.py

      - name: Commit and push revised post
        run: |
          git config user.name "blog-bot"
          git config user.email "actions@github.com"
          git add content/blogs.json
          git diff --cached --quiet || git commit -m "chore: revise blog post based on reviewer feedback"
          git push
